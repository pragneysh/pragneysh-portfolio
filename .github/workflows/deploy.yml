name: Build & Deploy Portfolio to S3 + CloudFront

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AWS_REGION: ap-south-1
  S3_BUCKET: pragneysh-portfolio

jobs:
  provision:
    name: Provision Infrastructure
    runs-on: ubuntu-latest

    outputs:
      distribution_id: ${{ steps.cf.outputs.id }}
      cf_domain: ${{ steps.cf.outputs.domain }}

    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install jq
        run: sudo apt-get install -y jq

      # ── S3 ─────────────────────────────
      - name: Ensure S3 bucket exists
        run: |
          if aws s3api head-bucket --bucket ${{ env.S3_BUCKET }} 2>/dev/null; then
            echo "✅ Bucket exists"
          else
            aws s3 mb s3://${{ env.S3_BUCKET }} --region ${{ env.AWS_REGION }}
            echo "✅ Bucket created"
          fi

      - name: Enable static hosting
        run: |
          aws s3 website s3://${{ env.S3_BUCKET }} \
            --index-document index.html \
            --error-document index.html

      # ── CLOUDFRONT ─────────────────────
      - name: Create or Get CloudFront Distribution
        id: cf
        run: |
          EXISTING_ID=$(aws cloudfront list-distributions \
            --query "DistributionList.Items[?contains(Origins.Items[0].DomainName, '${{ env.S3_BUCKET }}')].Id" \
            --output text)

          if [ "$EXISTING_ID" != "None" ] && [ -n "$EXISTING_ID" ]; then
            echo "✅ CloudFront exists: $EXISTING_ID"
            DOMAIN=$(aws cloudfront get-distribution --id $EXISTING_ID \
              --query "Distribution.DomainName" --output text)
          else
            echo "🚀 Creating CloudFront..."

            DIST_JSON=$(cat <<EOF
            {
              "CallerReference": "$(date +%s)",
              "Origins": {
                "Quantity": 1,
                "Items": [
                  {
                    "Id": "S3Origin",
                    "DomainName": "${{ env.S3_BUCKET }}.s3.amazonaws.com",
                    "S3OriginConfig": {
                      "OriginAccessIdentity": ""
                    }
                  }
                ]
              },
              "DefaultCacheBehavior": {
                "TargetOriginId": "S3Origin",
                "ViewerProtocolPolicy": "redirect-to-https",
                "AllowedMethods": {
                  "Quantity": 2,
                  "Items": ["GET", "HEAD"]
                },
                "ForwardedValues": {
                  "QueryString": false,
                  "Cookies": { "Forward": "none" }
                }
              },
              "Enabled": true
            }
EOF
            )

            RESULT=$(aws cloudfront create-distribution \
              --distribution-config "$DIST_JSON")

            ID=$(echo "$RESULT" | jq -r '.Distribution.Id')
            DOMAIN=$(echo "$RESULT" | jq -r '.Distribution.DomainName')
          fi

          echo "id=$ID" >> $GITHUB_OUTPUT
          echo "domain=$DOMAIN" >> $GITHUB_OUTPUT

          echo "🌐 CloudFront Domain: https://$DOMAIN"

  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    needs: provision

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Build
        run: npm run build

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to S3
        run: |
          aws s3 sync dist/ s3://${{ env.S3_BUCKET }} \
            --delete \
            --cache-control "no-cache"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ needs.provision.outputs.distribution_id }} \
            --paths "/*"

      - name: Print URLs
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🌐 Secure URL (HTTPS):"
          echo "https://${{ needs.provision.outputs.cf_domain }}"
          echo ""
          echo "⚠️ S3 URL:"
          echo "http://${{ env.S3_BUCKET }}.s3-website.${{ env.AWS_REGION }}.amazonaws.com"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━"